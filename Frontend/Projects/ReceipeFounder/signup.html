<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup-Recipe Founder</title>
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/footer.css">
    <link rel="stylesheet" href="./styles/loader.css">
    <link rel="stylesheet" href="./styles/signin.css">
</head>
<body>
    <header>
        <h1 class="logo">Receipe Founder</h1>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="#">Recipes</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="./signin.html">sign in</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- loader -->
        <section id="loader">
            <span class="loader"></span>
        </section>
        <!-- login form -->
        <section class="login-section">
        <form id="signupForm" class="login-form">

            <h2 class="form-title">Sign Up</h2>

            <div class="form-group">
                <label for="fullname">Fullname</label>
                <input type="text" name="fullname" id="fullname" placeholder="Enter your fullname" required>
            </div>

             <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter your email address" required>
                <div id="emailMessage"></div>
            </div>

             <div class="form-group">
                <label for="phone">phone number</label>
                <input type="tel" name="phone" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
                <div id="passwordMessage"></div>
            </div>

            <div class="form-group">
                <label for="repassword">Re Enter your password</label>
                <input type="password" name="repassword" id="repassword" placeholder="Re Enter your password" required>
                <div id="repasswordMessage"></div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary">Sign In</button>
                <button type="reset" class="btn-secondary">Cancel</button>
            </div>

            <div class="form-group-options">
                <div class="forgot">
                    already having an account? <a href="./signin.html">sign in</a>
                </div>
            </div>
        </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Receipe Founder. All rights reserved.</p>
    </footer>
</body>
<script type="module" src="./scripts/signup.js"></script>
</html>
